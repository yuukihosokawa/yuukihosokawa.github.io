<!DOCTYPE html>
<html>
 <head>
  <meta charset="utf-8"/>
  <meta content="initial-scale=1.0, maximum-scale=1, width=device-width" name="viewport"/>
  <title>Yuuki Hosokawa</title>
  <style>
    html, body {
      padding: 0;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #1d1d1f;
      background-color: #faf8f5;
    }

    * { box-sizing: border-box; }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
    }

    .main {
      width: 100%;
      max-width: 460px;
    }

    .wave {
      font-size: 40px;
      line-height: 1;
      margin: 0 0 16px 0;
      display: inline-block;
    }

    .greeting {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin: 0 0 24px 0;
      color: #1d1d1f;
      display: inline-block;
      cursor: default;
      transition: color 400ms ease, letter-spacing 400ms ease;
    }

    .greeting:hover {
      color: #86755f;
      letter-spacing: -0.015em;
    }

    .subtitle {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.55;
      margin: 0;
      color: #86868b;
      letter-spacing: -0.01em;
    }

    .list {
      list-style: none;
      padding: 0;
      margin: 12px 0 0 0;
    }

    .list li {
      font-size: 15px;
      line-height: 1.5;
      padding: 12px 14px;
      margin: 0 -14px;
      border-radius: 10px;
      color: #1d1d1f;
      transition: background-color 250ms ease;
    }

    .list li:hover {
      background-color: rgba(0, 0, 0, 0.04);
    }

    .list li .emoji {
      display: inline-block;
      width: 24px;
      margin-right: 10px;
    }

    .list li .label {
      color: #86868b;
      margin-right: 6px;
    }

    a {
      color: #1d1d1f;
      text-decoration: none;
      border-bottom: 1px solid rgba(29, 29, 31, 0.25);
      transition: border-color 250ms ease;
    }

    a:hover {
      border-bottom-color: #1d1d1f;
    }

    .row {
      display: flex;
      gap: 22px;
      margin-top: 0;
      padding-top: 12px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }

    .row a {
      font-size: 13px;
      color: #86868b;
      border-bottom: none;
      transition: color 250ms ease;
    }

    .row a:hover {
      color: #1d1d1f;
    }
  </style>
 </head>
 <body>
  <div class="container">
   <div class="main">
    <p class="wave">👋</p>
    <h1 class="greeting">Ciao, I'm Yuuki.</h1>
    <p class="subtitle">Passionate about longevity, art, biotech, and lifting.</p>
    <ul class="list">
     <li><span class="emoji">👨‍🔬</span><span class="label">Researcher at</span><a href="https://retro.bio/" target="_blank">Retro</a></li>
     <li><span class="emoji">🦧</span><span class="label">Writer at</span><a href="https://yuukihosokawa.substack.com/" target="_blank">Pongo Protocols</a></li>
     <li><span class="emoji">⛩️</span><span class="label">Living in</span>Belmont, CA</li>
    </ul>
    <div class="row">
     <a href="https://x.com/yuukihosok" target="_blank">Twitter</a>
     <a href="https://www.linkedin.com/in/yuukihosokawa/" target="_blank">LinkedIn</a>
    </div>
   </div>
  </div>
 </body>
</html>
